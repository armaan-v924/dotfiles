"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """
$os\
$shell\
$username\
$hostname\
$directory\
$git_branch\
"""

right_format = """
$cmd_duration\ 
$conda\
$time\
"""
[fill]
symbol = " "

[directory]
style = "bright-black"
truncate_to_repo = true
home_symbol = "п“ў"

[conda]
ignore_base = false
symbol = "оңј "
format = "[using $symbol$environment](bold green) "

[username]
format = '[\[](bright-black)[$user](cyan)[\]](bright-black) '
show_always = true

[hostname]
ssh_symbol = "о¬Ғ "

[character]
success_symbol = "[у°Ғ”](bright-cyan)"
error_symbol = "[у°Ғ”](bright-red)"
vimcmd_symbol = "[пҒ“](green)"

[git_branch]
format = "[on $symbol$branch ]($style)"
style = "purple"
symbol = "п„Ұ"

[git_status]
format = "[[($conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "вҖӢ"
untracked = "вҖӢ"
modified = "вҖӢ"
staged = "вҖӢ"
renamed = "вҖӢ"
deleted = "вҖӢ"
stashed = "вүЎ"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[time]
format = "[at $time]($style) "
style = "bright-black"
disabled = false
use_12hr = true

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"
min_time = 250

[shell]
fish_indicator = "у°Ҳә"
zsh_indicator = "у°°·"
powershell_indicator = "у°ЁҠ"
cmd_indicator = "оҜ„"
bash_indicator = "уұҶғ"
disabled = false
style = "cyan"

[memory_usage]
symbol = "у°Қӣ"
threshold = 0
disabled = false
style = "bright-black bold dimmed"
format = '[$symbol $ram]($style)'

[battery]
format = '[$symbol $percentage]($style) '
full_symbol = "у°Ғ№"
charging_symbol = "у°Ӯ„"
empty_symbol = "у°ӮҺ "
unknown_symbol = "у°Ӯ‘ "

[[battery.display]]
threshold = 10
style = "bright-red"
discharging_symbol = "у°Ғә"

[[battery.display]]
threshold = 20
style = "red dimmed"
discharging_symbol = "у°Ғ»"

[[battery.display]]
threshold = 30
style = "bright-yellow dimmed"
discharging_symbol = "у°Ғј"

[[battery.display]]
threshold = 40
style = "yellow dimmed"
discharging_symbol = "у°ҒҪ"

[[battery.display]]
threshold = 50
style = "green dimmed"
discharging_symbol = "у°Ғҫ"

[[battery.display]]
threshold = 60
style = "green dimmed"
discharging_symbol = "у°Ғҝ"

[[battery.display]]
threshold = 70
style = "bright-green dimmed"
discharging_symbol = "у°ӮҖ"

[[battery.display]]
threshold = 80
style = "bright-green dimmed"
discharging_symbol = "у°ӮҒ"

[[battery.display]]
threshold = 90
style = "bright-green dimmed"
discharging_symbol = "у°ӮӮ"

[python]
format = "[$symbol$virtualenv]($style) "
style = "bright-black"
symbol = "оҲө "

