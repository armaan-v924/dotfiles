"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """
$os\
$shell\
$username\
$hostname\
$directory\
$git_branch\
$character\
"""

right_format = """
$cmd_duration\ 
$conda\
$time\
"""
[fill]
symbol = " "

[directory]
style = "bright-black"
truncate_to_repo = true
home_symbol = "’ōó"

[conda]
ignore_base = false
symbol = "Ņ£╝ "
format = "[using $symbol$environment](bold green) "

[username]
format = '[\[](bright-black)[$user](cyan)[\]](bright-black) '
show_always = true

[hostname]
ssh_symbol = "Ņ¼ü "

[character]
success_symbol = "[¾░üö](bright-cyan)"
error_symbol = "[¾░üö](bright-red)"
vimcmd_symbol = "[’üō](green)"

[git_branch]
format = "[on $symbol$branch ]($style)"
style = "purple"
symbol = "’ä”"

[git_status]
format = "[[($conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "ŌĆŗ"
untracked = "ŌĆŗ"
modified = "ŌĆŗ"
staged = "ŌĆŗ"
